# Project-wide Gradle settings.

# Increased memory for Gradle and Kotlin daemon to speed up compilation
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx1536m

# Enable parallel execution and build caching for faster builds
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# Limit workers to avoid CPU/RAM thrashing on mid-range systems
org.gradle.workers.max=4

# AndroidX and other defaults
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
